name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ruby:
    name: "Lint: Ruby/Rails"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: services/web/.ruby-version
          bundler-cache: true
      - run: bundle exec rubocop --parallel --format github
      - run: bundle exec brakeman --quiet --no-pager

  lint-python:
    name: "Lint: Python/ML"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-ruby:
    name: "Test: Ruby/Rails"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: techmind
          POSTGRES_PASSWORD: techmind_dev
          POSTGRES_DB: techmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U techmind -d techmind_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true
      - run: bundle exec rails db:create db:migrate
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SECRET_KEY_BASE: test-secret-key
      - run: bundle exec rspec
        env:
          RAILS_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          DB_POOL: "1"
          RAILS_MAX_THREADS: "1"
          WEB_CONCURRENCY: "0"
          CACHE_TTL: "300"
          ML_TIMEOUT: "8"
          ML_HOST: ml
          ML_PORT: "8000"
          SECRET_KEY_BASE: test-secret-key

  test-python:
    name: "Test: Python/ML"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
