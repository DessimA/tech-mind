default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV["DB_HOST"] || "postgres" %>
  port: <%= ENV["DB_PORT"] || 5432 %>
  username: <%= ENV["DB_USER"] || "techmind" %>
  password: <%= ENV["DB_PASSWORD"] || "techmind_dev" %>

development:
  <<: *default
  database: <%= ENV["DB_NAME"] || "techmind_dev" %>

test:
  <<: *default
  database: <%= ENV["DB_TEST_NAME"] || "techmind_test" %>

production:
  <<: *default
  database: <%= ENV["DB_NAME"] || "techmind_dev" %>
