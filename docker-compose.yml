name: techmind

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-techmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-techmind_dev}
      POSTGRES_DB: ${DB_NAME:-techmind_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-techmind} -d ${DB_NAME:-techmind_dev}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - techmind
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - valkey-data:/data
    networks:
      - techmind
    restart: unless-stopped

  localstack:
    image: localstack/localstack-pro:latest
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:?token required}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SERVICES: s3,secretsmanager,sts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    volumes:
      - localstack-data:/var/lib/localstack
    networks:
      - techmind
    restart: unless-stopped

  terraform:
    image: hashicorp/terraform:1.9
    working_dir: /infra
    environment:
      AWS_ACCESS_KEY_ID: mock_access_key
      AWS_SECRET_ACCESS_KEY: mock_secret_key
      AWS_REGION: ${AWS_REGION:-us-east-1}
      LOCALSTACK_ENDPOINT: ${AWS_ENDPOINT:-http://localstack:4566}
    volumes:
      - ./infra:/infra
      - terraform-state:/infra/.terraform
    networks:
      - techmind
    profiles:
      - tools
    restart: no

volumes:
  pgdata:
  valkey-data:
  localstack-data:
  terraform-state:

networks:
  techmind:
    driver: bridge
