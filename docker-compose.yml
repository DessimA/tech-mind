name: techmind

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-techmind}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-techmind_dev}
      POSTGRES_DB: ${DB_NAME:-techmind_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-techmind} -d ${DB_NAME:-techmind_dev}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - techmind
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - valkey-data:/data
    networks:
      - techmind
    restart: unless-stopped

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-techmind}
      DB_PASSWORD: ${DB_PASSWORD:-techmind_dev}
      DB_NAME: ${DB_NAME:-techmind_dev}
      DB_POOL: "1"
      REDIS_HOST: ${REDIS_HOST:-valkey}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TIMEOUT: "2"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?required}
      RAILS_MAX_THREADS: "1"
      WEB_CONCURRENCY: "0"
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_LOG_TO_STDOUT: "true"
      SESSION_DRIVER: cookie
      ML_HOST: ml
      ML_PORT: "8000"
      ML_TIMEOUT: "8"
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_PERIOD: "60"
      RATE_LIMIT_LOGIN_MAX: "10"
      RATE_LIMIT_LOGIN_PERIOD: "60"
      CACHE_TTL: "300"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - techmind
    restart: unless-stopped

  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    volumes:
      - ./services/ml:/app
    environment:
      ML_THRESHOLD: ${ML_THRESHOLD:-0.5}
      MODEL_VERSION: ${MODEL_VERSION:-v1}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_TIMEOUT: "5"
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_MAX_TOKENS: ${GROQ_MAX_TOKENS:-1024}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - techmind
    restart: unless-stopped

  web-test:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    volumes:
      - ./services/web:/app
    entrypoint: ["/bin/sh", "-c", "bin/rails db:create 2>/dev/null; bin/rails db:migrate && bundle exec rspec"]
    environment:
      RAILS_ENV: test
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: techmind
      DB_PASSWORD: techmind_dev
      DB_NAME: techmind_test
      DB_TEST_NAME: techmind_test
      DB_POOL: "1"
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      REDIS_TIMEOUT: "2"
      SECRET_KEY_BASE: test-secret-key-base-for-testing
      RAILS_MAX_THREADS: "1"
      WEB_CONCURRENCY: "0"
      ML_HOST: ml
      ML_PORT: "8000"
      ML_TIMEOUT: "8"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    profiles:
      - test
    networks:
      - techmind
    restart: no

volumes:
  pgdata:
  valkey-data:

networks:
  techmind:
    driver: bridge
